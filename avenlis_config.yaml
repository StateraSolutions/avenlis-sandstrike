# Avenlis Configuration File
# This file contains LLM provider settings and red team testing configuration

# Ollama Configuration for Red Team Testing
ollama:
  endpoint: "http://localhost:11434"
  model: ""
  api:
    generate_endpoint: "http://localhost:11434/api/generate"

# Red Team Testing Targets
redteam:
  targets:
    - name: "ollama_mistral"
      type: "ollama"
      target: "ollama://mistral"
      description: "Local Ollama instance running Mistral model"
    
    - name: "ollama_direct"
      type: "http"
      target: "http://localhost:11434/api/generate"
      description: "Direct HTTP API access to Ollama"

    - name: "testing_api"
      type: "http"
      target: "http://127.0.0.1:8000/post"
      description: "Testing server API (POST)"
      method: "POST"               # or GET
      headers:                     # authentication & custom headers
        Authorization: "Bearer my-secret-token"
        Content-Type: "application/json"
      params:                      # query string params (?key=value)
        debug: true
      body:                        # request body (for POST/PUT)
        message: "Hello from YAML"
        user: "admin"
    
    - name: "testing_api_get"
      type: "http"
      target: "http://127.0.0.1:8000/get"
      description: "Testing server API (GET)"
      method: "GET"
      headers:
        Authorization: "Bearer my-secret-token"
      params:
        limit: 10
        offset: 0
    
    - name: "file_testing"
      type: "file"
      target: C:\Users\tan88\Desktop\Placeholder-api\llm.py

# Default Red Team Configuration
redteam_config:
  timeout: 30
  max_concurrent: 5
  retry_count: 3
  
# LLM Provider Settings
llm_providers:
  ollama:
    enabled: true
    endpoint: "http://localhost:11434"
    default_model: ""
    available_models: []
    
  openai:
    enabled: false
    # api_key: "${OPENAI_API_KEY}"  # Set via environment variable
    # model: "gpt-3.5-turbo"
    
  anthropic:
    enabled: false
    # api_key: "${ANTHROPIC_API_KEY}"  # Set via environment variable
    # model: "claude-3-haiku-20240307"
